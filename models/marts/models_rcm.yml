version: 2

models:
  - name: fct_claims_reconciliation
    description: Claim-level reconciliation of submitted charges vs payer remittances
    columns:
      - name: claim_id
        tests:
          - unique
          - not_null
      - name: adjudication_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: "{{ var('adjudication_status_values') }}"
      - name: paid_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
              config:
                where: "paid_amount is not null"
      - name: outstanding_balance
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  - name: dim_provider_performance
    description: Provider-level RCM performance aggregates
    columns:
      - name: provider_id
        tests:
          - unique
          - not_null
      - name: claim_denial_rate_pct
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 100"
